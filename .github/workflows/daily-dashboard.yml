name: Daily Dashboard

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8:00 AM UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  dashboard:
    name: Generate Daily Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect dashboard data
        run: |
          python3 - <<'PYEOF'
          import subprocess, json, os, platform

          def run(cmd, fallback="N/A"):
              try:
                  return subprocess.check_output(cmd, shell=True, text=True).strip()
              except Exception:
                  return fallback

          git = {
              "branch":          run("git branch --show-current"),
              "total_commits":   run("git rev-list --count HEAD"),
              "last_msg":        run("git log -1 --pretty=format:%s"),
              "last_date":       run("git log -1 --pretty=format:%cr"),
              "last_author":     run("git log -1 --pretty=format:%an"),
              "contributors":    run("git shortlog -sn HEAD | wc -l"),
              "recent_activity": run("git log --oneline -5 --format='%h|%s|%cr'"),
          }
          code = {
              "rust_files":    run("find . -name '*.rs' | grep -v target | wc -l"),
              "lines_of_code": run("find . -name '*.rs' | grep -v target | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}'"),
              "test_count":    run("grep -r '#\\[test\\]' --include='*.rs' . | grep -v target | wc -l || echo 0"),
              "todo_count":    run("grep -r 'TODO\\|FIXME\\|HACK' --include='*.rs' . | grep -v target | wc -l || echo 0"),
              "open_prs":      run("gh pr list --state open --json number --jq length 2>/dev/null || echo 0"),
          }
          sys_info = {
              "os":          platform.platform(),
              "kernel":      run("uname -r"),
              "arch":        run("uname -m"),
              "cpu_cores":   run("nproc"),
              "cpu_model":   run("grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs"),
              "ram_total":   run("free -h | awk '/^Mem:/{print $2}'"),
              "ram_used":    run("free -h | awk '/^Mem:/{print $3}'"),
              "ram_free":    run("free -h | awk '/^Mem:/{print $4}'"),
              "disk_total":  run("df -h / | awk 'NR==2{print $2}'"),
              "disk_used":   run("df -h / | awk 'NR==2{print $3}'"),
              "disk_free":   run("df -h / | awk 'NR==2{print $4}'"),
              "disk_pct":    run("df -h / | awk 'NR==2{print $5}'"),
              "load_avg":    run("cat /proc/loadavg | awk '{print $1, $2, $3}'"),
              "uptime":      run("uptime -p"),
              "runner_os":   os.environ.get("RUNNER_OS", "N/A"),
          }
          workflow = {
              "run_number": os.environ.get("GITHUB_RUN_NUMBER", "N/A"),
              "actor":      os.environ.get("GITHUB_ACTOR", "N/A"),
              "repo":       os.environ.get("GITHUB_REPOSITORY", "N/A"),
              "ref":        os.environ.get("GITHUB_REF_NAME", "N/A"),
          }
          with open("dashboard_data.json", "w") as f:
              json.dump({"git": git, "code": code, "sys": sys_info, "workflow": workflow}, f)
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update dashboard issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { git, code, sys, workflow } = JSON.parse(fs.readFileSync('dashboard_data.json', 'utf8'));
            const today = new Date().toISOString().split('T')[0];
            const time  = new Date().toUTCString();

            const activityRows = git.recent_activity.split('\n').map(line => {
              const parts = line.split('|');
              return `| \`${parts[0]}\` | ${parts[1]} | ${parts[2]} |`;
            }).join('\n');

            const todos    = parseInt(code.todo_count)   || 0;
            const tests    = parseInt(code.test_count)   || 0;
            const prs      = parseInt(code.open_prs)     || 0;
            const contribs = parseInt(git.contributors)  || 1;
            const diskPct  = parseInt(sys.disk_pct)      || 0;
            const advice   = [];

            if (todos > 10) advice.push('⚠️ **Technical Debt Alert**: ' + todos + ' TODO/FIXME items. Block time this week for a cleanup sprint.');
            else            advice.push('✅ **Clean Codebase**: Only ' + todos + ' TODO/FIXME items. Stay disciplined.');
            if (tests < 50) advice.push('🧪 **Boost Test Coverage**: ' + tests + ' tests is below 50. Add tests before adding new features.');
            else            advice.push('✅ **Healthy Test Suite**: ' + tests + ' tests. Keep coverage growing with every PR.');
            if (prs > 3)    advice.push('🔀 **PR Backlog**: ' + prs + ' open PRs — review, merge, or close stale ones.');
            if (prs === 0)  advice.push('✅ **Clean PR Queue**: No open PRs. Good time to refactor or start something new.');
            if (contribs < 2) advice.push('👥 **Bus Factor Risk**: Solo contributor. Document critical areas and consider a co-maintainer.');
            if (diskPct > 80) advice.push('💾 **Disk Warning**: ' + sys.disk_pct + ' used. Clean up build artifacts or expand storage.');
            else              advice.push('💾 **Disk Healthy**: ' + sys.disk_pct + ' used (' + sys.disk_free + ' free). No action needed.');
            advice.push('🔒 **Security**: Set `ANTHROPIC_API_KEY` in repo secrets so Claude Code Review runs fully on every PR.');
            advice.push('📅 **Daily Habit**: Check this dashboard first, then tackle the top-priority open PR.');

            const body = [
              `# 📊 Daily Dashboard — ${today}`,
              `> *Generated: ${time}*`,
              '',
              '---',
              '',
              '## 🗂️ Repository',
              '| Metric | Value |',
              '|--------|-------|',
              `| Branch | \`${git.branch}\` |`,
              `| Total Commits | ${git.total_commits} |`,
              `| Contributors | ${git.contributors} |`,
              `| Open PRs | ${code.open_prs} |`,
              '',
              '## 📦 Code Health',
              '| Metric | Value |',
              '|--------|-------|',
              `| Rust Source Files | ${code.rust_files} |`,
              `| Lines of Code | ${code.lines_of_code} |`,
              `| Tests | ${code.test_count} |`,
              `| TODO / FIXME / HACK | ${code.todo_count} |`,
              '',
              '## 📝 Last Commit',
              `> **${git.last_msg}**`,
              `> by ${git.last_author} — ${git.last_date}`,
              '',
              '## 🕐 Recent Activity',
              '| Hash | Message | When |',
              '|------|---------|------|',
              activityRows,
              '',
              '## 🖥️ System',
              '| Metric | Value |',
              '|--------|-------|',
              `| OS | ${sys.runner_os} |`,
              `| Kernel | ${sys.kernel} |`,
              `| Architecture | ${sys.arch} |`,
              `| CPU Model | ${sys.cpu_model} |`,
              `| CPU Cores | ${sys.cpu_cores} |`,
              `| Load Average (1/5/15m) | ${sys.load_avg} |`,
              `| Uptime | ${sys.uptime} |`,
              `| RAM Total | ${sys.ram_total} |`,
              `| RAM Used | ${sys.ram_used} |`,
              `| RAM Free | ${sys.ram_free} |`,
              `| Disk Total | ${sys.disk_total} |`,
              `| Disk Used | ${sys.disk_used} (${sys.disk_pct}) |`,
              `| Disk Free | ${sys.disk_free} |`,
              '',
              '## ⚙️ Workflow',
              '| Metric | Value |',
              '|--------|-------|',
              `| Run # | ${workflow.run_number} |`,
              `| Triggered by | ${workflow.actor} |`,
              `| Repository | ${workflow.repo} |`,
              `| Ref | ${workflow.ref} |`,
              '',
              '## 💡 Professional Advice',
              advice.map(a => `- ${a}`).join('\n'),
              '',
              '---',
              '*Auto-generated daily at 08:00 UTC · [View workflow runs](../../actions/workflows/daily-dashboard.yml)*',
            ].join('\n');

            // Reuse existing open dashboard issue or create new one
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['dashboard'],
              state: 'open',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                title: `📊 Daily Dashboard — ${today}`,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📊 Daily Dashboard — ${today}`,
                body,
                labels: ['dashboard'],
              });
            }
